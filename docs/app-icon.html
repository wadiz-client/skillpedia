<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>앱 아이콘 | Skillpedia</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<style>
  /* ---- Base ---- */
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #F2F5F8;
    color: #212121;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
    word-break: keep-all;
    overflow-wrap: anywhere;
    -webkit-font-smoothing: auto;
  }

  /* ---- Page sheet ---- */
  .page {
    max-width: 820px;
    margin: 40px auto;
    padding: 72px 80px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(33, 37, 41, 0.06);
  }

  /* ---- Typography ---- */
  h1 { font-size: 38px; font-weight: 800; color: #191F28; line-height: 1.2; margin: 0 0 12px; }
  .lede { font-size: 17px; color: #6B7684; line-height: 1.6; margin: 0 0 8px; }
  h2 { font-size: 24px; font-weight: 700; color: #191F28; line-height: 1.3; margin: 60px 0 16px; }
  p  { font-size: 16px; line-height: 1.7; color: #212121; margin: 0 0 14px; }
  b  { color: #191F28; }

  /* ---- Figure ---- */
  figure { margin: 20px 0; }
  figcaption { font-size: 13px; color: #8B95A1; margin-top: 10px; text-align: center; line-height: 1.5; }
  .panel { background: #FAFBFD; border: 1px solid #E3E7EE; border-radius: 12px; }

  /* ---- Icon tiles ---- */
  .icon { display: flex; align-items: center; justify-content: center; }
  .safe { position: relative; overflow: hidden; }
  .safe .guide { position: absolute; inset: 26%; border: 1.5px dashed #00C4C4; border-radius: 14px; }
  .tile-label { font-size: 13px; color: #6B7684; font-weight: 600; text-align: center; margin-top: 12px; }

  /* ---- Home screen mock ---- */
  .home { width: 300px; border-radius: 40px; padding: 22px; background: linear-gradient(160deg,#3a4a5c,#1c2530); box-shadow: 0 12px 40px rgba(33,37,41,0.28); }
  .home-grid { display: grid; grid-template-columns: repeat(4,56px); justify-content: space-between; row-gap: 20px; }
  .home-app { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .home-app .tile { width: 56px; height: 56px; border-radius: 13px; background: #5b6b7d; }
  .home-app .tile.brand { background: #0B0B0C; color: #fff; display: flex; align-items: center; justify-content: center; }
  .home-app .label { font-size: 10px; color: #fff; opacity: 0.6; }
  .home-app .label.on { opacity: 0.92; }

  /* ---- Size ladder ---- */
  .ladder { display: flex; align-items: flex-end; gap: 30px; flex-wrap: wrap; justify-content: center; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .step .tile { background: #0B0B0C; color: #fff; display: flex; align-items: center; justify-content: center; }
  .step .n { font-size: 11px; color: #B1B8C3; }

  @media print {
    body { background: #fff; }
    .page { max-width: none; margin: 0; padding: 0; border-radius: 0; box-shadow: none; }
    h2 { break-after: avoid; }
    figure { break-inside: avoid; }
  }
</style>
</head>
<body>

<!--
  Skillpedia 앱 아이콘
  단일 소스: 아래 <symbol id="ic"> (1024×1024). 색상은 currentColor를 따릅니다.
  심볼 배치: 1024 캔버스 중앙, 약 47% 크기 / 사방 약 26% 여백(세이프 에어리어).
-->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="ic" viewBox="0 0 1024 1024">
      <g fill="currentColor">
        <rect x="272" y="320" width="192" height="96"></rect>
        <circle cx="656" cy="368" r="96"></circle>
        <circle cx="368" cy="656" r="96"></circle>
        <rect x="560" y="608" width="192" height="96"></rect>
      </g>
    </symbol>
  </defs>
</svg>

<main class="page">

  <h1>Skillpedia 앱 아이콘</h1>
  <p class="lede">심볼을 아이콘 세이프 에어리어 안에 배치했습니다. 1024×1024 캔버스에 심볼 <b>약 47% 크기</b>, 사방 <b>약 26% 여백</b>. iOS 스쿼클 라운드(반경 224)로 홈 화면에서도 안정적으로 읽힙니다.</p>

  <!-- HERO -->
  <figure style="margin-top:32px;">
    <div style="display:flex; gap:16px;">
      <div style="flex:1;">
        <div class="icon" style="aspect-ratio:1; border-radius:22%; background:#0B0B0C; color:#fff; box-shadow:0 8px 32px rgba(33,37,41,0.16);"><svg width="47%" viewBox="0 0 1024 1024"><use href="#ic"></use></svg></div>
        <div class="tile-label">기본형 (다크)</div>
      </div>
      <div style="flex:1;">
        <div class="icon" style="aspect-ratio:1; border-radius:22%; background:#fff; color:#191F28; border:1px solid #E3E7EE; box-shadow:0 8px 32px rgba(33,37,41,0.10);"><svg width="47%" viewBox="0 0 1024 1024"><use href="#ic"></use></svg></div>
        <div class="tile-label">반전형 (라이트)</div>
      </div>
      <div style="flex:1;">
        <div class="icon safe" style="aspect-ratio:1; border-radius:22%; background:#fff; color:#191F28; border:1px solid #E3E7EE;">
          <div class="guide"></div>
          <svg width="47%" viewBox="0 0 1024 1024"><use href="#ic"></use></svg>
        </div>
        <div class="tile-label">세이프 에어리어 (26%)</div>
      </div>
    </div>
    <figcaption>기본형 · 반전형 · 세이프 에어리어 — 사방 26% 여백에 심볼 배치</figcaption>
  </figure>

  <!-- HOME SCREEN -->
  <h2>홈 화면</h2>
  <p>실제 배치 맥락입니다. 어두운 배경의 홈 화면에서도 다크 아이콘이 또렷하게 구분됩니다.</p>
  <figure>
    <div class="panel" style="padding:32px; display:flex; justify-content:center;">
      <div class="home">
        <div class="home-grid">
          <div class="home-app"><div class="tile brand"><svg width="56" height="56" viewBox="0 0 1024 1024"><use href="#ic"></use></svg></div><span class="label on">Skillpedia</span></div>
          <div class="home-app"><div class="tile"></div><span class="label">앱</span></div>
          <div class="home-app"><div class="tile"></div><span class="label">앱</span></div>
          <div class="home-app"><div class="tile"></div><span class="label">앱</span></div>
          <div class="home-app"><div class="tile"></div><span class="label">앱</span></div>
          <div class="home-app"><div class="tile"></div><span class="label">앱</span></div>
          <div class="home-app"><div class="tile"></div><span class="label">앱</span></div>
          <div class="home-app"><div class="tile"></div><span class="label">앱</span></div>
        </div>
      </div>
    </div>
    <figcaption>홈 화면에 놓인 Skillpedia 앱 아이콘</figcaption>
  </figure>

  <!-- SIZE LADDER -->
  <h2>아이콘 사이즈</h2>
  <p>같은 아이콘을 여러 크기로 사용해도 여백 덕분에 심볼이 모서리에 닿지 않고 또렷합니다.</p>
  <figure>
    <div class="panel" style="padding:36px 30px;">
      <div class="ladder">
        <div class="step"><div class="tile" style="width:20px;height:20px;border-radius:5px;"><svg width="20" height="20" viewBox="0 0 1024 1024"><use href="#ic"></use></svg></div><span class="n">20</span></div>
        <div class="step"><div class="tile" style="width:29px;height:29px;border-radius:7px;"><svg width="29" height="29" viewBox="0 0 1024 1024"><use href="#ic"></use></svg></div><span class="n">29</span></div>
        <div class="step"><div class="tile" style="width:40px;height:40px;border-radius:9px;"><svg width="40" height="40" viewBox="0 0 1024 1024"><use href="#ic"></use></svg></div><span class="n">40</span></div>
        <div class="step"><div class="tile" style="width:60px;height:60px;border-radius:14px;"><svg width="60" height="60" viewBox="0 0 1024 1024"><use href="#ic"></use></svg></div><span class="n">60</span></div>
        <div class="step"><div class="tile" style="width:87px;height:87px;border-radius:20px;"><svg width="87" height="87" viewBox="0 0 1024 1024"><use href="#ic"></use></svg></div><span class="n">87</span></div>
      </div>
    </div>
    <figcaption>20 · 29 · 40 · 60 · 87px — iOS 아이콘 사이즈 예시</figcaption>
  </figure>

</main>

</body>
</html>
