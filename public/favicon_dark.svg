<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <title>Skillpedia Favicon</title>
  <desc>Skillpedia favicon — 다크 모드에서는 light 버전(흰 배경/검정 심볼)으로 전환합니다.</desc>

  <style>
    .bg { fill: #0B0B0C; }
    .mark { fill: #fff; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #fff; }
      .mark { fill: #191F28; }
    }
  </style>

  <rect class="bg" width="512" height="512" rx="112"></rect>

  <g class="mark" transform="translate(256,256) scale(0.745)">
    <rect x="-220" y="-176" width="176" height="88"></rect>
    <circle cx="132" cy="-132" r="88"></circle>
    <circle cx="-132" cy="132" r="88"></circle>
    <rect x="44" y="88" width="176" height="88"></rect>
  </g>
</svg>
