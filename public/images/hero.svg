<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" role="img" aria-hidden="true">
  <defs>
    <clipPath id="hero-clip">
      <rect width="500" height="400" rx="16" />
    </clipPath>
    <radialGradient id="hero-bg" cx="50%" cy="45%" r="85%">
      <stop offset="0%" stop-color="#1b1136" />
      <stop offset="70%" stop-color="#0a0612" />
      <stop offset="100%" stop-color="#0a0612" />
    </radialGradient>
    <radialGradient id="hero-g1" cx="32%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#b794ff" />
      <stop offset="45%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#3b1d8f" />
    </radialGradient>
    <radialGradient id="hero-g2" cx="32%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#0a0612" />
      <stop offset="38%" stop-color="#0a0612" />
      <stop offset="41%" stop-color="#9b7bff" />
      <stop offset="70%" stop-color="#5b2bd6" />
      <stop offset="100%" stop-color="#5b2bd6" />
    </radialGradient>
    <radialGradient id="hero-g3" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#a5f3d0" />
      <stop offset="40%" stop-color="#34d399" />
      <stop offset="75%" stop-color="#1e9e8a" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </radialGradient>
    <radialGradient id="hero-g4" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffd1e0" />
      <stop offset="38%" stop-color="#ff6b9d" />
      <stop offset="78%" stop-color="#c026d3" />
      <stop offset="100%" stop-color="#6d28d9" />
    </radialGradient>
    <radialGradient id="hero-g5" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#c4b5ff" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4c1d95" />
    </radialGradient>
    <radialGradient id="hero-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="55%" stop-color="#f4f0ff" />
      <stop offset="72%" stop-color="#f4f0ff" stop-opacity="0" />
    </radialGradient>
    <filter id="hero-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" />
    </filter>
    <filter id="hero-halo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>
  <g clip-path="url(#hero-clip)">
    <rect width="500" height="400" fill="url(#hero-bg)" />
    <g filter="url(#hero-soft)">
      <circle cx="85" cy="83" r="115" fill="url(#hero-g1)" />
      <circle cx="145" cy="107" r="75" fill="url(#hero-g2)" />
      <circle cx="410" cy="86" r="110" fill="url(#hero-g3)" />
      <circle cx="435" cy="287" r="105" fill="url(#hero-g4)" />
      <circle cx="130" cy="340" r="100" fill="url(#hero-g5)" />
    </g>
    <circle cx="250" cy="200" r="90" fill="#ffffff" opacity="0.3" filter="url(#hero-halo)" />
    <circle cx="250" cy="200" r="65" fill="url(#hero-glow)" />
  </g>
</svg>
